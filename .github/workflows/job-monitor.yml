name: Quant Job Monitor

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: quant-job-alerts-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate required secrets
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Missing repository secret DISCORD_WEBHOOK_URL"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run job monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LOG_LEVEL: INFO
          MIN_SCORE: 4
          DATABASE_PATH: data/seen_jobs.sqlite
        run: python -m src.main

      # Note:
      # GitHub-hosted runners are ephemeral, so data/seen_jobs.sqlite will not persist
      # across scheduled runs unless you add an external persistence strategy later.
